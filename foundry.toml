# Foundry configuration for the Pot contracts.
# Foundry is optional — Hardhat is the primary toolchain — but the test suite in
# test/PotPool.t.sol is written for forge. Run with: forge test -vvv
#
# Setup (one time):
#   forge install foundry-rs/forge-std
#   forge install OpenZeppelin/openzeppelin-contracts
#
# The remappings below let the Solidity sources resolve the same import paths
# under both Hardhat (node_modules) and Foundry (lib).

[profile.default]
src = "contracts"
test = "test"
out = "out"
libs = ["node_modules", "lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
    "forge-std/=lib/forge-std/src/",
]
